name: Fetch Football Matches

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Script dosyasını oluştur
        run: |
          mkdir -p scripts
          cat > scripts/fetchMatches.js <<'EOF'
          const fs = require("fs");

          const competitions = ["PL", "PD", "SA", "BL1", "DED"];

          function formToScore(form) {
            if (!form || form === "-") return 0;
            return form
              .split(",")
              .map(x => x.trim())
              .reduce((sum, result) => {
                if (result === "W") return sum + 3;
                if (result === "D") return sum + 1;
                return sum;
              }, 0);
          }

          function getDecision(home, away) {
            const homePos = home.position || 99;
            const awayPos = away.position || 99;
            const homeFormScore = home.formScore || 0;
            const awayFormScore = away.formScore || 0;

            const rankDiff = awayPos - homePos;
            const formDiff = homeFormScore - awayFormScore;

            if (rankDiff >= 8 && formDiff >= 2) {
              return {
                suggestion: "1X",
                confidence: "Yüksek",
                riskLevel: "Düşük",
                reason: "Ev sahibi hem sıralamada hem formda belirgin avantaja sahip."
              };
            }

            if (rankDiff <= -8 && formDiff <= -2) {
              return {
                suggestion: "X2",
                confidence: "Yüksek",
                riskLevel: "Düşük",
                reason: "Deplasman ekibi hem sıralamada hem formda belirgin avantaja sahip."
              };
            }

            if (Math.abs(rankDiff) <= 3 && Math.abs(formDiff) <= 2) {
              return {
                suggestion: "3.5 Alt",
                confidence: "Orta",
                riskLevel: "Orta",
                reason: "Takımlar birbirine yakın görünüyor, kontrollü maç ihtimali öne çıkıyor."
              };
            }

            if (Math.abs(rankDiff) >= 5) {
              return {
                suggestion: "1.5 Üst",
                confidence: "Orta",
                riskLevel: "Orta",
                reason: "Güç farkı nedeniyle maçta en az iki gol çıkma ihtimali öne çıkıyor."
              };
            }

            return {
              suggestion: "Temkinli",
              confidence: "Düşük",
              riskLevel: "Yüksek",
              reason: "Veriler net ve güçlü bir düşük risk fırsatı vermiyor."
            };
          }

          async function fetchJson(url, apiKey) {
            const response = await fetch(url, {
              headers: { "X-Auth-Token": apiKey }
            });

            if (!response.ok) {
              throw new Error(`İstek başarısız: ${url} (${response.status})`);
            }

            return response.json();
          }

          async function run() {
            const apiKey = process.env.FOOTBALL_DATA_API_KEY;
            const allMatches = [];

            for (const code of competitions) {
              try {
                const matchesUrl = `https://api.football-data.org/v4/competitions/${code}/matches?status=SCHEDULED`;
                const standingsUrl = `https://api.football-data.org/v4/competitions/${code}/standings`;

                const matchesData = await fetchJson(matchesUrl, apiKey);
                const standingsData = await fetchJson(standingsUrl, apiKey);

                const table = standingsData.standings?.find(s => s.type === "TOTAL")?.table || [];

                const teamMap = {};
                for (const row of table) {
                  const teamId = row.team?.id;
                  if (!teamId) continue;

                  teamMap[teamId] = {
                    position: row.position || null,
                    form: row.form || "-",
                    formScore: formToScore(row.form || "-")
                  };
                }

                const simplified = (matchesData.matches || []).slice(0, 10).map(match => {
                  const homeId = match.homeTeam?.id;
                  const awayId = match.awayTeam?.id;

                  const homeStats = teamMap[homeId] || {};
                  const awayStats = teamMap[awayId] || {};

                  const decision = getDecision(homeStats, awayStats);

                  return {
                    league: matchesData.competition?.name || code,
                    utcDate: match.utcDate,
                    homeTeam: match.homeTeam?.name || "Bilinmiyor",
                    awayTeam: match.awayTeam?.name || "Bilinmiyor",
                    homePosition: homeStats.position || null,
                    awayPosition: awayStats.position || null,
                    homeForm: homeStats.form || "-",
                    awayForm: awayStats.form || "-",
                    homeFormScore: homeStats.formScore || 0,
                    awayFormScore: awayStats.formScore || 0,
                    suggestion: decision.suggestion,
                    confidence: decision.confidence,
                    riskLevel: decision.riskLevel,
                    suggestionReason: decision.reason
                  };
                });

                allMatches.push(...simplified);
              } catch (error) {
                console.log(`${code} alınamadı: ${error.message}`);
              }
            }

            fs.mkdirSync("data", { recursive: true });
            fs.writeFileSync("data/matches.json", JSON.stringify(allMatches, null, 2), "utf8");
            console.log("matches.json güncellendi");
          }

          run().catch(err => {
            console.error(err);
            process.exit(1);
          });
          EOF

      - name: Maçları çek
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: node scripts/fetchMatches.js

      - name: Değişiklikleri kaydet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/matches.json
          git diff --cached --quiet || git commit -m "guven ve risk alanlari guncellendi"
          git push
