<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JeyJey</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: #e5eefc;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      background: linear-gradient(135deg, #111b31, #16223d);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 28px;
      padding: 32px;
      margin-bottom: 24px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.28);
    }

    .brand {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: #c9d9ff;
      font-size: 13px;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .hero h1 {
      margin: 0 0 12px 0;
      font-size: 42px;
      color: white;
    }

    .hero p {
      margin: 0;
      font-size: 17px;
      line-height: 1.7;
      color: #b7c7e6;
      max-width: 800px;
    }

    .top-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 28px;
    }

    .panel-box, .filter-box, .footer-box, .loading-box, .empty-box, .match-card, .featured-card {
      background: #11192d;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 22px;
      box-shadow: 0 10px 26px rgba(0,0,0,0.20);
    }

    .panel-box, .filter-box, .footer-box, .loading-box, .empty-box {
      padding: 20px;
    }

    .stat-label {
      font-size: 13px;
      color: #8ea3c7;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 30px;
      font-weight: bold;
      color: white;
    }

    .filter-box {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .filter-box label {
      font-size: 13px;
      color: #8ea3c7;
      margin-bottom: 8px;
    }

    .filter-box select {
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 14px;
      padding: 12px;
      font-size: 15px;
      background: #0d1528;
      color: #e5eefc;
    }

    .section-title {
      font-size: 28px;
      margin: 0 0 10px 0;
      color: white;
    }

    .section-subtitle {
      color: #8ea3c7;
      margin-bottom: 18px;
      line-height: 1.6;
    }

    .featured-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 30px;
    }

    .featured-card {
      padding: 20px;
      background: linear-gradient(180deg, #121d35, #10182c);
    }

    .featured-title {
      font-size: 12px;
      color: #8ea3c7;
      text-transform: uppercase;
      margin-bottom: 12px;
      letter-spacing: 0.04em;
    }

    .featured-match {
      font-size: 22px;
      font-weight: bold;
      line-height: 1.4;
      color: white;
      margin-bottom: 14px;
    }

    .featured-market {
      font-size: 26px;
      font-weight: bold;
      color: #86efac;
      margin-bottom: 12px;
    }

    .featured-reason {
      font-size: 14px;
      color: #b7c7e6;
      line-height: 1.6;
    }

    .matches-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    .match-card {
      padding: 22px;
    }

    .league-tag {
      display: inline-block;
      background: rgba(255,255,255,0.07);
      color: #c9d9ff;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
      margin-bottom: 14px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .match-title {
      font-size: 24px;
      margin: 0 0 12px 0;
      line-height: 1.4;
      color: white;
    }

    .match-time {
      font-size: 14px;
      color: #8ea3c7;
      margin-bottom: 16px;
    }

    .match-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .meta-box {
      background: #0d1528;
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 14px;
    }

    .meta-label {
      font-size: 12px;
      color: #8ea3c7;
      margin-bottom: 6px;
    }

    .meta-value {
      font-size: 18px;
      font-weight: bold;
      color: white;
    }

    .suggestion-box {
      margin-top: 8px;
      background: rgba(16, 185, 129, 0.10);
      border: 1px solid rgba(52, 211, 153, 0.25);
      border-radius: 18px;
      padding: 16px;
    }

    .suggestion-title {
      font-size: 12px;
      color: #86efac;
      margin-bottom: 8px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .suggestion-market {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 12px;
      color: #bbf7d0;
    }

    .badge-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .badge {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      border: 1px solid transparent;
    }

    .badge-confidence-high {
      background: rgba(34,197,94,0.12);
      color: #86efac;
      border-color: rgba(34,197,94,0.22);
    }

    .badge-confidence-medium {
      background: rgba(245,158,11,0.12);
      color: #fcd34d;
      border-color: rgba(245,158,11,0.22);
    }

    .badge-confidence-low {
      background: rgba(239,68,68,0.12);
      color: #fca5a5;
      border-color: rgba(239,68,68,0.22);
    }

    .badge-risk-low {
      background: rgba(59,130,246,0.12);
      color: #93c5fd;
      border-color: rgba(59,130,246,0.22);
    }

    .badge-risk-medium {
      background: rgba(245,158,11,0.12);
      color: #fcd34d;
      border-color: rgba(245,158,11,0.22);
    }

    .badge-risk-high {
      background: rgba(239,68,68,0.12);
      color: #fca5a5;
      border-color: rgba(239,68,68,0.22);
    }

    .suggestion-reason {
      font-size: 14px;
      color: #d7e5ff;
      line-height: 1.6;
    }

    .footer-box {
      margin-top: 28px;
      color: #8ea3c7;
      line-height: 1.7;
    }

    .empty-box, .loading-box {
      color: #8ea3c7;
      text-align: center;
    }

    @media (max-width: 1100px) {
      .featured-grid,
      .matches-grid,
      .top-grid {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 34px;
      }
    }

    @media (max-width: 700px) {
      .container {
        padding: 16px;
      }

      .hero {
        padding: 24px;
      }

      .hero h1 {
        font-size: 28px;
      }

      .hero p {
        font-size: 16px;
      }

      .match-meta {
        grid-template-columns: 1fr;
      }

      .featured-match {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="loading-box">Maçlar yükleniyor...</div>
  </div>

  <script>
    let allMatches = [];

    function formatDate(utcDate) {
      const date = new Date(utcDate);
      return date.toLocaleString("tr-TR", {
        dateStyle: "medium",
        timeStyle: "short"
      });
    }

    function getUniqueLeagues(matches) {
      return [...new Set(matches.map(match => match.league))].sort();
    }

    function confidenceClass(value) {
      if (value === "Yüksek") return "badge-confidence-high";
      if (value === "Orta") return "badge-confidence-medium";
      return "badge-confidence-low";
    }

    function riskClass(value) {
      if (value === "Düşük") return "badge-risk-low";
      if (value === "Orta") return "badge-risk-medium";
      return "badge-risk-high";
    }

    function featuredMatches(matches) {
      const scored = [...matches].sort((a, b) => {
        const scoreA =
          (a.confidence === "Yüksek" ? 3 : a.confidence === "Orta" ? 2 : 1) +
          (a.riskLevel === "Düşük" ? 3 : a.riskLevel === "Orta" ? 2 : 1);
        const scoreB =
          (b.confidence === "Yüksek" ? 3 : b.confidence === "Orta" ? 2 : 1) +
          (b.riskLevel === "Düşük" ? 3 : b.riskLevel === "Orta" ? 2 : 1);
        return scoreB - scoreA;
      });
      return scored.slice(0, 3);
    }

    function renderPage(matches, selectedLeague = "Tümü") {
      const app = document.getElementById("app");
      const leagues = getUniqueLeagues(allMatches);

      const filteredMatches =
        selectedLeague === "Tümü"
          ? matches
          : matches.filter(match => match.league === selectedLeague);

      const featured = featuredMatches(filteredMatches);

      app.innerHTML = `
        <div class="hero">
          <div class="brand">JeyJey</div>
          <h1>Düşük Risk Analiz Paneli</h1>
          <p>
            JeyJey, yaklaşan maçları otomatik toplar ve ilk karar motoruyla daha kontrollü market önerileri üretir.
            Bu sürümde öne çıkan maçlar, güven ve risk rozetleri ve daha modern bir görünüm yer alır.
          </p>
        </div>

        <div class="top-grid">
          <div class="panel-box">
            <div class="stat-label">Toplam Maç</div>
            <div class="stat-value">${allMatches.length}</div>
          </div>

          <div class="panel-box">
            <div class="stat-label">Gösterilen Maç</div>
            <div class="stat-value">${filteredMatches.length}</div>
          </div>

          <div class="filter-box">
            <label for="leagueFilter">Lig Filtresi</label>
            <select id="leagueFilter">
              <option value="Tümü" ${selectedLeague === "Tümü" ? "selected" : ""}>Tümü</option>
              ${leagues.map(league => `
                <option value="${league}" ${selectedLeague === league ? "selected" : ""}>
                  ${league}
                </option>
              `).join("")}
            </select>
          </div>
        </div>

        <h2 class="section-title">Öne Çıkan Maçlar</h2>
        <div class="section-subtitle">
          Karar motorunun mevcut kurallarına göre en dikkat çeken eşleşmeler.
        </div>

        <div class="featured-grid">
          ${featured.map(item => `
            <div class="featured-card">
              <div class="featured-title">${item.league}</div>
              <div class="featured-match">${item.homeTeam} vs ${item.awayTeam}</div>
              <div class="featured-market">${item.suggestion || "-"}</div>
              <div class="badge-row">
                <span class="badge ${confidenceClass(item.confidence)}">Güven: ${item.confidence || "-"}</span>
                <span class="badge ${riskClass(item.riskLevel)}">Risk: ${item.riskLevel || "-"}</span>
              </div>
              <div class="featured-reason">${item.suggestionReason || "Henüz öneri yok."}</div>
            </div>
          `).join("")}
        </div>

        <h2 class="section-title">Tüm Maçlar</h2>
        <div class="section-subtitle">
          Aşağıdaki kartlar canlı maç verisi ve ilk öneri motoru çıktısını gösterir.
        </div>

        ${
          filteredMatches.length === 0
            ? `<div class="empty-box">Bu filtrede gösterilecek maç bulunamadı.</div>`
            : `<div class="matches-grid">
                ${filteredMatches.map(item => `
                  <div class="match-card">
                    <div class="league-tag">${item.league}</div>
                    <h2 class="match-title">${item.homeTeam} vs ${item.awayTeam}</h2>
                    <div class="match-time">Maç zamanı: ${formatDate(item.utcDate)}</div>

                    <div class="match-meta">
                      <div class="meta-box">
                        <div class="meta-label">Ev Sahibi Sırası</div>
                        <div class="meta-value">${item.homePosition ?? "-"}</div>
                      </div>
                      <div class="meta-box">
                        <div class="meta-label">Deplasman Sırası</div>
                        <div class="meta-value">${item.awayPosition ?? "-"}</div>
                      </div>
                      <div class="meta-box">
                        <div class="meta-label">Ev Sahibi Form</div>
                        <div class="meta-value">${item.homeForm || "-"}</div>
                      </div>
                      <div class="meta-box">
                        <div class="meta-label">Deplasman Form</div>
                        <div class="meta-value">${item.awayForm || "-"}</div>
                      </div>
                    </div>

                    <div class="suggestion-box">
                      <div class="suggestion-title">İlk Öneri</div>
                      <div class="suggestion-market">${item.suggestion || "-"}</div>

                      <div class="badge-row">
                        <span class="badge ${confidenceClass(item.confidence)}">Güven: ${item.confidence || "-"}</span>
                        <span class="badge ${riskClass(item.riskLevel)}">Risk: ${item.riskLevel || "-"}</span>
                      </div>

                      <div class="suggestion-reason">${item.suggestionReason || "Henüz öneri yok."}</div>
                    </div>
                  </div>
                `).join("")}
              </div>`
        }

        <div class="footer-box">
          Bu sürümde öneriler basit kurallarla üretiliyor. Bir sonraki büyük adım oran katmanı ve daha güçlü analiz mantığı olacak.
        </div>
      `;

      const leagueFilter = document.getElementById("leagueFilter");
      if (leagueFilter) {
        leagueFilter.addEventListener("change", (e) => {
          renderPage(allMatches, e.target.value);
        });
      }
    }

    async function loadMatches() {
      const app = document.getElementById("app");

      try {
        const response = await fetch(`./data/matches.json?v=${Date.now()}`);
        const matches = await response.json();
        allMatches = matches;
        renderPage(allMatches);
      } catch (error) {
        app.innerHTML = `
          <div class="empty-box">
            Maç verileri yüklenemedi. Biraz sonra tekrar dene.
          </div>
        `;
        console.error(error);
      }
    }

    loadMatches();
  </script>
</body>
</html>
