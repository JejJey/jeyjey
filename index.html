<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JeyJey</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #0f172a;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      padding: 36px;
      border-radius: 24px;
      margin-bottom: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    }

    .brand {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      font-size: 13px;
      margin-bottom: 16px;
    }

    .hero h1 {
      margin: 0 0 12px 0;
      font-size: 42px;
    }

    .hero p {
      margin: 0;
      font-size: 18px;
      color: #dbeafe;
      max-width: 760px;
      line-height: 1.6;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin: 24px 0;
    }

    .stat-box {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 6px 18px rgba(15,23,42,0.06);
    }

    .stat-label {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 30px;
      font-weight: bold;
    }

    .section-title {
      font-size: 28px;
      margin: 28px 0 10px 0;
    }

    .section-subtitle {
      color: #475569;
      margin-bottom: 18px;
    }

    .match-card {
      background: white;
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 18px;
      box-shadow: 0 6px 18px rgba(15,23,42,0.06);
    }

    .league-tag {
      display: inline-block;
      background: #e2e8f0;
      color: #334155;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
      margin-bottom: 14px;
    }

    .match-title {
      font-size: 30px;
      margin: 0 0 18px 0;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }

    .info-box {
      background: #f8fafc;
      border-radius: 18px;
      padding: 16px;
      min-height: 92px;
    }

    .info-box.green {
      background: #ecfdf5;
    }

    .info-box.red {
      background: #fef2f2;
    }

    .info-label {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 8px;
    }

    .info-value {
      font-size: 22px;
      font-weight: bold;
    }

    .reason-box {
      background: #f8fafc;
      border-radius: 18px;
      padding: 18px;
    }

    .reason-box h3 {
      margin-top: 0;
      font-size: 16px;
      color: #475569;
    }

    .reason-box ul {
      margin: 0;
      padding-left: 20px;
      line-height: 1.8;
    }

    .footer-box {
      margin-top: 28px;
      background: white;
      border-radius: 20px;
      padding: 20px;
      color: #475569;
      box-shadow: 0 6px 18px rgba(15,23,42,0.06);
    }

    .edit-box {
      margin-top: 24px;
      background: #fff7ed;
      border: 1px solid #fdba74;
      border-radius: 20px;
      padding: 20px;
      color: #7c2d12;
    }

    .edit-box h3 {
      margin-top: 0;
    }

    .edit-box code {
      background: rgba(255,255,255,0.7);
      padding: 2px 6px;
      border-radius: 6px;
    }

    @media (max-width: 1000px) {
      .info-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .stats {
        grid-template-columns: repeat(2, 1fr);
      }

      .hero h1 {
        font-size: 32px;
      }

      .match-title {
        font-size: 24px;
      }
    }

    @media (max-width: 600px) {
      .stats,
      .info-grid {
        grid-template-columns: 1fr;
      }

      .container {
        padding: 16px;
      }

      .hero {
        padding: 24px;
      }

      .hero h1 {
        font-size: 28px;
      }

      .hero p {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container" id="app"></div>

  <script>
    const matches = [
      {
        league: "Süper Lig",
        match: "Galatasaray vs Kasımpaşa",
        safestMarket: "1X",
        odd: "1.12",
        probability: "%84",
        risk: "2.1",
        confidence: "8.8",
        avoidMarket: "MS2",
        reasons: [
          "Ev sahibi iç sahada istikrarlı.",
          "Rakip deplasmanda kırılgan.",
          "Eksik oyuncu etkisi ev sahibi lehine."
        ]
      },
      {
        league: "Premier League",
        match: "Brighton vs Brentford",
        safestMarket: "3.5 Alt",
        odd: "1.28",
        probability: "%79",
        risk: "2.9",
        confidence: "8.1",
        avoidMarket: "MS1",
        reasons: [
          "İki takımın son maç profili kontrollü.",
          "4+ gol çıkan maç sayısı düşük.",
          "Maç temposu orta seviyede bekleniyor."
        ]
      },
      {
        league: "La Liga",
        match: "Real Sociedad vs Getafe",
        safestMarket: "4.5 Alt",
        odd: "1.18",
        probability: "%88",
        risk: "1.8",
        confidence: "8.5",
        avoidMarket: "2.5 Üst",
        reasons: [
          "Yüksek skorlu maç profili zayıf.",
          "Savunma düzeni güçlü görünüyor.",
          "Kaotik maç olasılığı düşük."
        ]
      }
    ];

    const app = document.getElementById("app");

    app.innerHTML = `
      <div class="hero">
        <div class="brand">JeyJey</div>
        <h1>Düşük Riskli Market Analiz Paneli</h1>
        <p>
          JeyJey, en yüksek oranı değil en düşük kırılganlığa sahip marketi bulmak için tasarlanmış kişisel analiz panelidir.
          Amaç yüksek riskli seçimleri kovalamak değil, daha kontrollü ve daha güvenli karar desteği sunmaktır.
        </p>
      </div>

      <div class="stats">
        <div class="stat-box">
          <div class="stat-label">Analiz Edilen Maç</div>
          <div class="stat-value">${matches.length}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Aktif Mod</div>
          <div class="stat-value">Low Risk</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Ürün Durumu</div>
          <div class="stat-value">Demo</div>
        </div>
      </div>

      <h2 class="section-title">Bugünün Seçimleri</h2>
      <div class="section-subtitle">
        Şimdilik örnek veri ile çalışan ilk sürüm.
      </div>

      ${matches.map(item => `
        <div class="match-card">
          <div class="league-tag">${item.league}</div>
          <h2 class="match-title">${item.match}</h2>

          <div class="info-grid">
            <div class="info-box green">
              <div class="info-label">En Düşük Riskli Market</div>
              <div class="info-value">${item.safestMarket}</div>
            </div>
            <div class="info-box">
              <div class="info-label">Oran</div>
              <div class="info-value">${item.odd}</div>
            </div>
            <div class="info-box">
              <div class="info-label">Gerçekleşme Olasılığı</div>
              <div class="info-value">${item.probability}</div>
            </div>
            <div class="info-box">
              <div class="info-label">Risk Skoru</div>
              <div class="info-value">${item.risk}</div>
            </div>
            <div class="info-box">
              <div class="info-label">Güven Skoru</div>
              <div class="info-value">${item.confidence}</div>
            </div>
          </div>

          <div class="info-grid" style="grid-template-columns: 1fr;">
            <div class="info-box red">
              <div class="info-label">Kaçınılacak Market</div>
              <div class="info-value">${item.avoidMarket}</div>
            </div>
          </div>

          <div class="reason-box">
            <h3>Neden bu market seçildi?</h3>
            <ul>
              ${item.reasons.map(reason => `<li>${reason}</li>`).join("")}
            </ul>
          </div>
        </div>
      `).join("")}

      <div class="footer-box">
        JeyJey şu anda örnek veri ile çalışan ilk ücretsiz prototiptir. Sonraki adımda bu verileri daha kolay değiştirebileceğin basit bir düzene çevireceğiz.
      </div>

      <div class="edit-box">
        <h3>Nasıl düzenleyeceksin?</h3>
        <p>
          Bundan sonra yeni maç eklemek için sadece kod içindeki <code>const matches = [ ]</code> bölümünü düzenleyeceğiz.
        </p>
        <p>
          Yani tüm sayfayı değil, sadece maç verilerini değiştireceksin.
        </p>
      </div>
    `;
  </script>
</body>
</html>
