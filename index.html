<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JeyJey</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef3f9;
      color: #0f172a;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      padding: 36px;
      border-radius: 24px;
      margin-bottom: 24px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.14);
    }

    .brand {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      font-size: 13px;
      margin-bottom: 16px;
    }

    .hero h1 {
      margin: 0 0 12px 0;
      font-size: 40px;
    }

    .hero p {
      margin: 0;
      font-size: 17px;
      line-height: 1.7;
      color: #dbeafe;
      max-width: 780px;
    }

    .top-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-box, .filter-box, .footer-box, .loading-box, .empty-box {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 6px 18px rgba(15,23,42,0.06);
    }

    .stat-label {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: bold;
    }

    .section-title {
      font-size: 28px;
      margin: 28px 0 10px 0;
    }

    .section-subtitle {
      color: #475569;
      margin-bottom: 18px;
    }

    .filter-box {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .filter-box label {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 8px;
    }

    .filter-box select {
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      padding: 12px;
      font-size: 15px;
      background: #f8fafc;
    }

    .matches-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    .match-card {
      background: white;
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 6px 18px rgba(15,23,42,0.06);
      border: 1px solid #e2e8f0;
    }

    .league-tag {
      display: inline-block;
      background: #e2e8f0;
      color: #334155;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
      margin-bottom: 14px;
    }

    .match-title {
      font-size: 24px;
      margin: 0 0 14px 0;
      line-height: 1.4;
    }

    .match-time {
      font-size: 15px;
      color: #475569;
      margin-bottom: 14px;
    }

    .match-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    .meta-box {
      background: #f8fafc;
      border-radius: 16px;
      padding: 14px;
    }

    .meta-label {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 6px;
    }

    .meta-value {
      font-size: 18px;
      font-weight: bold;
    }

    .suggestion-box {
      margin-top: 16px;
      background: #ecfdf5;
      border: 1px solid #bbf7d0;
      border-radius: 18px;
      padding: 16px;
    }

    .suggestion-title {
      font-size: 13px;
      color: #166534;
      margin-bottom: 8px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .suggestion-market {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 8px;
      color: #14532d;
    }

    .suggestion-reason {
      font-size: 14px;
      color: #166534;
      line-height: 1.6;
    }

    .footer-box {
      margin-top: 28px;
      color: #475569;
    }

    .empty-box {
      text-align: center;
      color: #475569;
    }

    @media (max-width: 1000px) {
      .top-grid,
      .matches-grid {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 32px;
      }
    }

    @media (max-width: 600px) {
      .container {
        padding: 16px;
      }

      .hero {
        padding: 24px;
      }

      .hero h1 {
        font-size: 28px;
      }

      .hero p {
        font-size: 16px;
      }

      .match-meta {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="loading-box">Maçlar yükleniyor...</div>
  </div>

  <script>
    let allMatches = [];

    function formatDate(utcDate) {
      const date = new Date(utcDate);
      return date.toLocaleString("tr-TR", {
        dateStyle: "medium",
        timeStyle: "short"
      });
    }

    function getUniqueLeagues(matches) {
      return [...new Set(matches.map(match => match.league))].sort();
    }

    function renderPage(matches, selectedLeague = "Tümü") {
      const app = document.getElementById("app");
      const leagues = getUniqueLeagues(allMatches);

      const filteredMatches =
        selectedLeague === "Tümü"
          ? matches
          : matches.filter(match => match.league === selectedLeague);

      app.innerHTML = `
        <div class="hero">
          <div class="brand">JeyJey</div>
          <h1>Düşük Risk Analiz Paneli</h1>
          <p>
            JeyJey artık otomatik maç verisiyle birlikte ilk öneri motorunu da çalıştırıyor.
            Bu sürümde lig filtresi, takım sıra bilgisi ve basit güvenli market önerisi gösteriliyor.
          </p>
        </div>

        <div class="top-grid">
          <div class="stat-box">
            <div class="stat-label">Toplam Maç</div>
            <div class="stat-value">${allMatches.length}</div>
          </div>

          <div class="stat-box">
            <div class="stat-label">Gösterilen Maç</div>
            <div class="stat-value">${filteredMatches.length}</div>
          </div>

          <div class="filter-box">
            <label for="leagueFilter">Lig Filtresi</label>
            <select id="leagueFilter">
              <option value="Tümü" ${selectedLeague === "Tümü" ? "selected" : ""}>Tümü</option>
              ${leagues.map(league => `
                <option value="${league}" ${selectedLeague === league ? "selected" : ""}>
                  ${league}
                </option>
              `).join("")}
            </select>
          </div>
        </div>

        <h2 class="section-title">Yaklaşan Maçlar</h2>
        <div class="section-subtitle">
          Aşağıdaki liste canlı maç verisi ve ilk karar motoru çıktısını gösterir.
        </div>

        ${
          filteredMatches.length === 0
            ? `<div class="empty-box">Bu filtrede gösterilecek maç bulunamadı.</div>`
            : `<div class="matches-grid">
                ${filteredMatches.map(item => `
                  <div class="match-card">
                    <div class="league-tag">${item.league}</div>
                    <h2 class="match-title">${item.homeTeam} vs ${item.awayTeam}</h2>
                    <div class="match-time">Maç zamanı: ${formatDate(item.utcDate)}</div>

                    <div class="match-meta">
                      <div class="meta-box">
                        <div class="meta-label">Ev Sahibi Sırası</div>
                        <div class="meta-value">${item.homePosition ?? "-"}</div>
                      </div>
                      <div class="meta-box">
                        <div class="meta-label">Deplasman Sırası</div>
                        <div class="meta-value">${item.awayPosition ?? "-"}</div>
                      </div>
                      <div class="meta-box">
                        <div class="meta-label">Ev Sahibi Form</div>
                        <div class="meta-value">${item.homeForm || "-"}</div>
                      </div>
                      <div class="meta-box">
                        <div class="meta-label">Deplasman Form</div>
                        <div class="meta-value">${item.awayForm || "-"}</div>
                      </div>
                    </div>

                    <div class="suggestion-box">
                      <div class="suggestion-title">İlk Öneri</div>
                      <div class="suggestion-market">${item.suggestion || "-"}</div>
                      <div class="suggestion-reason">${item.suggestionReason || "Henüz öneri yok."}</div>
                    </div>
                  </div>
                `).join("")}
              </div>`
        }

        <div class="footer-box">
          Bu sürümde öneriler basit kurallarla üretiliyor. Sıradaki aşamada oran ve daha güçlü analiz katmanı ekleyeceğiz.
        </div>
      `;

      const leagueFilter = document.getElementById("leagueFilter");
      if (leagueFilter) {
        leagueFilter.addEventListener("change", (e) => {
          renderPage(allMatches, e.target.value);
        });
      }
    }

    async function loadMatches() {
      const app = document.getElementById("app");

      try {
        const response = await fetch("./data/matches.json");
        const matches = await response.json();
        allMatches = matches;
        renderPage(allMatches);
      } catch (error) {
        app.innerHTML = `
          <div class="empty-box">
            Maç verileri yüklenemedi. Biraz sonra tekrar dene.
          </div>
        `;
        console.error(error);
      }
    }

    loadMatches();
  </script>
</body>
</html>
