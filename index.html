<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JeyJey</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #0f172a;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      padding: 36px;
      border-radius: 24px;
      margin-bottom: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    }

    .brand {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      font-size: 13px;
      margin-bottom: 16px;
    }

    .hero h1 {
      margin: 0 0 12px 0;
      font-size: 42px;
    }

    .hero p {
      margin: 0;
      font-size: 18px;
      color: #dbeafe;
      max-width: 760px;
      line-height: 1.6;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin: 24px 0;
    }

    .stat-box {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 6px 18px rgba(15,23,42,0.06);
    }

    .stat-label {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: bold;
    }

    .section-title {
      font-size: 28px;
      margin: 28px 0 10px 0;
    }

    .section-subtitle {
      color: #475569;
      margin-bottom: 18px;
    }

    .match-card {
      background: white;
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 18px;
      box-shadow: 0 6px 18px rgba(15,23,42,0.06);
    }

    .league-tag {
      display: inline-block;
      background: #e2e8f0;
      color: #334155;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
      margin-bottom: 14px;
    }

    .match-title {
      font-size: 30px;
      margin: 0 0 14px 0;
    }

    .match-time {
      font-size: 16px;
      color: #475569;
      margin-bottom: 10px;
    }

    .empty-box, .loading-box, .footer-box {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 6px 18px rgba(15,23,42,0.06);
    }

    .footer-box {
      margin-top: 28px;
      color: #475569;
    }

    @media (max-width: 900px) {
      .stats {
        grid-template-columns: repeat(2, 1fr);
      }

      .hero h1 {
        font-size: 32px;
      }

      .match-title {
        font-size: 24px;
      }
    }

    @media (max-width: 600px) {
      .stats {
        grid-template-columns: 1fr;
      }

      .container {
        padding: 16px;
      }

      .hero {
        padding: 24px;
      }

      .hero h1 {
        font-size: 28px;
      }

      .hero p {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="loading-box">Maçlar yükleniyor...</div>
  </div>

  <script>
    function formatDate(utcDate) {
      const date = new Date(utcDate);
      return date.toLocaleString("tr-TR", {
        dateStyle: "medium",
        timeStyle: "short"
      });
    }

    async function loadMatches() {
      const app = document.getElementById("app");

      try {
        const response = await fetch("./data/matches.json");
        const matches = await response.json();

        app.innerHTML = `
          <div class="hero">
            <div class="brand">JeyJey</div>
            <h1>Otomatik Maç Listesi</h1>
            <p>
              JeyJey artık maç verilerini otomatik çekiyor. Bu aşamada sadece maç listesi gösteriliyor.
              Bir sonraki adımda oran, risk skoru ve analiz katmanını ekleyeceğiz.
            </p>
          </div>

          <div class="stats">
            <div class="stat-box">
              <div class="stat-label">Toplam Maç</div>
              <div class="stat-value">${matches.length}</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">Veri Kaynağı</div>
              <div class="stat-value">API</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">Durum</div>
              <div class="stat-value">Canlı Veri</div>
            </div>
          </div>

          <h2 class="section-title">Yaklaşan Maçlar</h2>
          <div class="section-subtitle">
            Bu liste otomatik olarak güncellenen maç verilerinden oluşturuluyor.
          </div>

          ${
            matches.length === 0
              ? `<div class="empty-box">Şu an gösterilecek maç bulunamadı.</div>`
              : matches.map(item => `
                <div class="match-card">
                  <div class="league-tag">${item.league}</div>
                  <h2 class="match-title">${item.homeTeam} vs ${item.awayTeam}</h2>
                  <div class="match-time">Maç zamanı: ${formatDate(item.utcDate)}</div>
                </div>
              `).join("")
          }

          <div class="footer-box">
            JeyJey'in bu sürümünde veriler otomatik geliyor. Sıradaki adım, bu maçların üzerine oran ve düşük risk analizi eklemek.
          </div>
        `;
      } catch (error) {
        app.innerHTML = `
          <div class="empty-box">
            Maç verileri yüklenemedi. Biraz sonra tekrar dene.
          </div>
        `;
        console.error(error);
      }
    }

    loadMatches();
  </script>
</body>
</html>
