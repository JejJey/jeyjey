<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JeyJey</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #071018;
      --panel: #0d1722;
      --panel-2: #101c29;
      --panel-3: #132233;
      --text: #eef6ff;
      --muted: #8da3bb;
      --line: rgba(255,255,255,0.07);
      --green: #8BFF72;
      --green-soft: rgba(139,255,114,0.12);
      --yellow: #FFD84D;
      --yellow-soft: rgba(255,216,77,0.12);
      --blue: #6FC7FF;
      --blue-soft: rgba(111,199,255,0.12);
      --red: #FF7D7D;
      --red-soft: rgba(255,125,125,0.12);
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(139,255,114,0.08), transparent 24%),
        radial-gradient(circle at top right, rgba(255,216,77,0.08), transparent 22%),
        linear-gradient(180deg, #071018 0%, #09131d 100%);
      color: var(--text);
    }

    .container {
      max-width: 1320px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(139,255,114,0.08), transparent 28%),
        linear-gradient(225deg, rgba(255,216,77,0.08), transparent 22%),
        linear-gradient(180deg, #0d1722 0%, #0b1520 100%);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 30px;
      margin-bottom: 24px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.28);
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -80px;
      top: -80px;
      width: 240px;
      height: 240px;
      background: radial-gradient(circle, rgba(139,255,114,0.12), transparent 60%);
      pointer-events: none;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--line);
      color: #dbeafe;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .brand-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 12px rgba(139,255,114,0.7);
    }

    .hero h1 {
      margin: 0 0 10px 0;
      font-size: 42px;
      color: white;
      letter-spacing: -0.02em;
    }

    .hero p {
      margin: 0;
      max-width: 850px;
      color: #aebfd3;
      font-size: 17px;
      line-height: 1.75;
    }

    .top-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 28px;
    }

    .panel-box, .filter-box, .footer-box, .loading-box, .empty-box, .match-card, .featured-card {
      border-radius: 24px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel) 0%, #0b1520 100%);
      box-shadow: 0 12px 28px rgba(0,0,0,0.22);
    }

    .panel-box, .filter-box, .footer-box, .loading-box, .empty-box {
      padding: 20px;
    }

    .panel-box {
      position: relative;
      overflow: hidden;
    }

    .panel-box::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(139,255,114,0.05), transparent 45%);
      pointer-events: none;
    }

    .stat-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 30px;
      font-weight: bold;
      color: white;
    }

    .filter-box label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .filter-box select {
      width: 100%;
      border-radius: 14px;
      padding: 12px;
      font-size: 15px;
      color: white;
      background: #0a1320;
      border: 1px solid var(--line);
      outline: none;
    }

    .section-title {
      font-size: 28px;
      margin: 0 0 10px 0;
      color: white;
      letter-spacing: -0.02em;
    }

    .section-subtitle {
      color: var(--muted);
      margin-bottom: 18px;
      line-height: 1.65;
    }

    .featured-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 30px;
    }

    .featured-card {
      padding: 22px;
      background:
        linear-gradient(180deg, rgba(139,255,114,0.05), transparent 38%),
        linear-gradient(180deg, #101b29 0%, #0c1622 100%);
      position: relative;
      overflow: hidden;
    }

    .featured-card::after {
      content: "";
      position: absolute;
      top: -40px;
      right: -30px;
      width: 140px;
      height: 140px;
      background: radial-gradient(circle, rgba(255,216,77,0.14), transparent 65%);
      pointer-events: none;
    }

    .featured-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .featured-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }

    .signal-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: bold;
      color: #1a1a1a;
      background: var(--yellow);
      box-shadow: 0 0 18px rgba(255,216,77,0.18);
    }

    .featured-match {
      font-size: 22px;
      font-weight: bold;
      line-height: 1.4;
      color: white;
      margin-bottom: 12px;
    }

    .featured-market {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 16px;
      background: var(--green-soft);
      border: 1px solid rgba(139,255,114,0.22);
      color: var(--green);
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .featured-reason {
      font-size: 14px;
      line-height: 1.65;
      color: #cad7e7;
    }

    .matches-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    .match-card {
      padding: 22px;
      background:
        linear-gradient(180deg, rgba(111,199,255,0.04), transparent 30%),
        linear-gradient(180deg, var(--panel-2) 0%, #0b1520 100%);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 10px;
    }

    .league-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--line);
      color: #d4e2f4;
      font-size: 12px;
    }

    .league-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--blue);
      box-shadow: 0 0 10px rgba(111,199,255,0.55);
    }

    .match-title {
      font-size: 24px;
      margin: 0 0 10px 0;
      line-height: 1.4;
      color: white;
      letter-spacing: -0.02em;
    }

    .match-time {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .match-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .meta-box {
      border-radius: 18px;
      padding: 14px;
      background: linear-gradient(180deg, var(--panel-3) 0%, #0d1723 100%);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .meta-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .meta-value {
      font-size: 18px;
      font-weight: bold;
      color: white;
    }

    .suggestion-box {
      margin-top: 8px;
      padding: 16px;
      border-radius: 20px;
      background:
        linear-gradient(180deg, rgba(139,255,114,0.08), transparent 60%),
        #0d1c14;
      border: 1px solid rgba(139,255,114,0.22);
      box-shadow: inset 0 0 0 1px rgba(139,255,114,0.03);
    }

    .suggestion-title {
      font-size: 12px;
      color: #bdf5ae;
      margin-bottom: 8px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .suggestion-market {
      font-size: 24px;
      font-weight: bold;
      color: var(--green);
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .badge-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      border: 1px solid transparent;
    }

    .badge-confidence-high {
      background: var(--green-soft);
      color: var(--green);
      border-color: rgba(139,255,114,0.20);
    }

    .badge-confidence-medium {
      background: var(--yellow-soft);
      color: var(--yellow);
      border-color: rgba(255,216,77,0.20);
    }

    .badge-confidence-low {
      background: var(--red-soft);
      color: #ffb0b0;
      border-color: rgba(255,125,125,0.20);
    }

    .badge-risk-low {
      background: rgba(111,199,255,0.12);
      color: var(--blue);
      border-color: rgba(111,199,255,0.20);
    }

    .badge-risk-medium {
      background: var(--yellow-soft);
      color: var(--yellow);
      border-color: rgba(255,216,77,0.20);
    }

    .badge-risk-high {
      background: var(--red-soft);
      color: #ffb0b0;
      border-color: rgba(255,125,125,0.20);
    }

    .suggestion-reason {
      font-size: 14px;
      color: #d9e7f8;
      line-height: 1.65;
    }

    .footer-box {
      margin-top: 28px;
      color: var(--muted);
      line-height: 1.7;
    }

    .empty-box, .loading-box {
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 1100px) {
      .featured-grid,
      .matches-grid,
      .top-grid {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 34px;
      }
    }

    @media (max-width: 700px) {
      .container { padding: 16px; }
      .hero { padding: 24px; }
      .hero h1 { font-size: 28px; }
      .hero p { font-size: 16px; }
      .match-meta { grid-template-columns: 1fr; }
      .featured-match { font-size: 20px; }
      .card-top { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="loading-box">Maçlar yükleniyor...</div>
  </div>

  <script>
    let allMatches = [];

    function formatDate(utcDate) {
      const date = new Date(utcDate);
      return date.toLocaleString("tr-TR", {
        dateStyle: "medium",
        timeStyle: "short"
      });
    }

    function getUniqueLeagues(matches) {
      return [...new Set(matches.map(match => match.league))].sort();
    }

    function confidenceClass(value) {
      if (value === "Yüksek") return "badge-confidence-high";
      if (value === "Orta") return "badge-confidence-medium";
      return "badge-confidence-low";
    }

    function riskClass(value) {
      if (value === "Düşük") return "badge-risk-low";
      if (value === "Orta") return "badge-risk-medium";
      return "badge-risk-high";
    }

    function featuredMatches(matches) {
      const scored = [...matches].sort((a, b) => {
        const scoreA =
          (a.confidence === "Yüksek" ? 3 : a.confidence === "Orta" ? 2 : 1) +
          (a.riskLevel === "Düşük" ? 3 : a.riskLevel === "Orta" ? 2 : 1);
        const scoreB =
          (b.confidence === "Yüksek" ? 3 : b.confidence === "Orta" ? 2 : 1) +
          (b.riskLevel === "Düşük" ? 3 : b.riskLevel === "Orta" ? 2 : 1);
        return scoreB - scoreA;
      });
      return scored.slice(0, 3);
    }

    function renderPage(matches, selectedLeague = "Tümü") {
      const app = document.getElementById("app");
      const leagues = getUniqueLeagues(allMatches);

      const filteredMatches =
        selectedLeague === "Tümü"
          ? matches
          : matches.filter(match => match.league === selectedLeague);

      const featured = featuredMatches(filteredMatches);

      app.innerHTML = `
        <div class="hero">
          <div class="brand"><span class="brand-dot"></span> JeyJey</div>
          <h1>Düşük Risk Analiz Paneli</h1>
          <p>
            JeyJey, yaklaşan maçları otomatik toplar ve ilk karar motoruyla daha kontrollü market önerileri üretir.
            Bu sürüm, daha canlı vurgu renkleri ve daha güçlü dashboard hissi ile yeniden tasarlandı.
          </p>
        </div>

        <div class="top-grid">
          <div class="panel-box">
            <div class="stat-label">Toplam Maç</div>
            <div class="stat-value">${allMatches.length}</div>
          </div>

          <div class="panel-box">
            <div class="stat-label">Gösterilen Maç</div>
            <div class="stat-value">${filteredMatches.length}</div>
          </div>

          <div class="filter-box">
            <label for="leagueFilter">Lig Filtresi</label>
            <select id="leagueFilter">
              <option value="Tümü" ${selectedLeague === "Tümü" ? "selected" : ""}>Tümü</option>
              ${leagues.map(league => `
                <option value="${league}" ${selectedLeague === league ? "selected" : ""}>
                  ${league}
                </option>
              `).join("")}
            </select>
          </div>
        </div>

        <h2 class="section-title">Öne Çıkan Maçlar</h2>
        <div class="section-subtitle">
          Mevcut kurallara göre en dikkat çeken düşük risk adayları.
        </div>

        <div class="featured-grid">
          ${featured.map(item => `
            <div class="featured-card">
              <div class="featured-top">
                <div class="featured-title">${item.league}</div>
                <div class="signal-pill">ÖNE ÇIKAN</div>
              </div>
              <div class="featured-match">${item.homeTeam} vs ${item.awayTeam}</div>
              <div class="featured-market">${item.suggestion || "-"}</div>
              <div class="badge-row">
                <span class="badge ${confidenceClass(item.confidence)}">Güven: ${item.confidence || "-"}</span>
                <span class="badge ${riskClass(item.riskLevel)}">Risk: ${item.riskLevel || "-"}</span>
              </div>
              <div class="featured-reason">${item.suggestionReason || "Henüz öneri yok."}</div>
            </div>
          `).join("")}
        </div>

        <h2 class="section-title">Tüm Maçlar</h2>
        <div class="section-subtitle">
          Canlı maç verisi ve karar motoru çıktısı.
        </div>

        ${
          filteredMatches.length === 0
            ? `<div class="empty-box">Bu filtrede gösterilecek maç bulunamadı.</div>`
            : `<div class="matches-grid">
                ${filteredMatches.map(item => `
                  <div class="match-card">
                    <div class="card-top">
                      <div class="league-tag"><span class="league-dot"></span>${item.league}</div>
                    </div>

                    <h2 class="match-title">${item.homeTeam} vs ${item.awayTeam}</h2>
                    <div class="match-time">Maç zamanı: ${formatDate(item.utcDate)}</div>

                    <div class="match-meta">
                      <div class="meta-box">
                        <div class="meta-label">Ev Sahibi Sırası</div>
                        <div class="meta-value">${item.homePosition ?? "-"}</div>
                      </div>
                      <div class="meta-box">
                        <div class="meta-label">Deplasman Sırası</div>
                        <div class="meta-value">${item.awayPosition ?? "-"}</div>
                      </div>
                      <div class="meta-box">
                        <div class="meta-label">Ev Sahibi Form</div>
                        <div class="meta-value">${item.homeForm || "-"}</div>
                      </div>
                      <div class="meta-box">
                        <div class="meta-label">Deplasman Form</div>
                        <div class="meta-value">${item.awayForm || "-"}</div>
                      </div>
                    </div>

                    <div class="suggestion-box">
                      <div class="suggestion-title">İlk Öneri</div>
                      <div class="suggestion-market">${item.suggestion || "-"}</div>

                      <div class="badge-row">
                        <span class="badge ${confidenceClass(item.confidence)}">Güven: ${item.confidence || "-"}</span>
                        <span class="badge ${riskClass(item.riskLevel)}">Risk: ${item.riskLevel || "-"}</span>
                      </div>

                      <div class="suggestion-reason">${item.suggestionReason || "Henüz öneri yok."}</div>
                    </div>
                  </div>
                `).join("")}
              </div>`
        }

        <div class="footer-box">
          Bu sürümde öneriler hâlâ kural tabanlı. Sonraki büyük adım oran katmanı ve daha gelişmiş karar mantığı olacak.
        </div>
      `;

      const leagueFilter = document.getElementById("leagueFilter");
      if (leagueFilter) {
        leagueFilter.addEventListener("change", (e) => {
          renderPage(allMatches, e.target.value);
        });
      }
    }

    async function loadMatches() {
      const app = document.getElementById("app");

      try {
        const response = await fetch(`./data/matches.json?v=${Date.now()}`);
        const matches = await response.json();
        allMatches = matches;
        renderPage(allMatches);
      } catch (error) {
        app.innerHTML = `<div class="empty-box">Maç verileri yüklenemedi. Biraz sonra tekrar dene.</div>`;
        console.error(error);
      }
    }

    loadMatches();
  </script>
</body>
</html>
